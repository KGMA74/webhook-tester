<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webhook Tester</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar        { width:5px; height:5px }
    ::-webkit-scrollbar-track  { background:#0f172a }
    ::-webkit-scrollbar-thumb  { background:#334155; border-radius:3px }
    .tk-key { color:#67e8f9 }
    .tk-str { color:#34d399 }
    .tk-num { color:#fbbf24 }
    .tk-kw  { color:#a78bfa }
    @keyframes flash-in {
      0%   { background-color: rgba(16,185,129,.18); box-shadow: inset 0 0 0 1px rgba(16,185,129,.35) }
      100% { background-color: transparent;          box-shadow: none }
    }
    .flash-new { animation: flash-in 1.4s ease-out forwards }
    /* Mobile: detail pane hidden until a row is selected */
    @media (max-width: 767px) {
      #detail-pane { display: none }
    }
  </style>
</head>
<body class="h-screen flex flex-col bg-slate-950 text-slate-200 font-mono antialiased overflow-hidden">

<!-- ── Toast ──────────────────────────────────────────────────────────────── -->
<div id="toast" class="fixed bottom-5 right-5 z-50 pointer-events-none">
  <div id="toast-inner"
       class="bg-slate-800 border border-slate-700 text-slate-200 text-xs px-4 py-2.5 rounded-xl shadow-2xl
              flex items-center gap-2 transition-all duration-200 opacity-0 translate-y-1">
    <svg class="w-3.5 h-3.5 text-emerald-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
    </svg>
    <span id="toast-msg">Copied!</span>
  </div>
</div>

<!-- ── Response Config Modal ──────────────────────────────────────────────── -->
<div id="resp-modal" class="fixed inset-0 z-40 hidden">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeRespModal()"></div>
  <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 max-w-lg mx-auto
              bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl p-6">
    <h2 class="text-sm font-bold text-white mb-5 flex items-center gap-2">
      <svg class="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Configure Response
    </h2>
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-slate-500 block mb-1.5">Status Code</label>
          <input id="resp-status" type="number" min="100" max="599" value="200"
                 class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white
                        focus:outline-none focus:border-sky-600 tabular-nums transition-colors"/>
        </div>
        <div>
          <label class="text-xs text-slate-500 block mb-1.5">Content-Type</label>
          <input id="resp-ctype" type="text" value="application/json"
                 class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white
                        focus:outline-none focus:border-sky-600 transition-colors"/>
        </div>
      </div>
      <div>
        <label class="text-xs text-slate-500 block mb-1.5">Response Body</label>
        <textarea id="resp-body" rows="5" spellcheck="false"
                  class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white
                         focus:outline-none focus:border-sky-600 resize-none leading-relaxed transition-colors"></textarea>
      </div>
    </div>
    <div class="flex items-center justify-between mt-5">
      <button onclick="resetRespConfig()" class="text-xs text-slate-600 hover:text-slate-400 transition-colors">
        Reset to default
      </button>
      <div class="flex gap-2">
        <button onclick="closeRespModal()"
                class="px-4 py-2 text-xs border border-slate-700 rounded-lg hover:bg-slate-800 transition-colors">
          Cancel
        </button>
        <button onclick="saveRespConfig()"
                class="px-4 py-2 text-xs bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg transition-colors font-bold">
          Save
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header class="shrink-0 z-10 border-b border-slate-800 bg-slate-950/95 backdrop-blur">
  <div class="flex items-center gap-2 px-4 py-3">

    <a href="/" class="text-sm font-bold text-white hover:text-emerald-400 transition-colors shrink-0 tracking-tight">
      Webhook<span class="text-emerald-400">.</span>
    </a>

    <div class="w-px h-4 bg-slate-800 shrink-0"></div>

    <!-- Webhook URL -->
    <code id="webhook-url"
          class="text-xs text-emerald-400 bg-slate-900 border border-slate-800 px-2 py-1 rounded-lg
                 select-all cursor-text truncate flex-1 min-w-0 max-w-xs"></code>
    <button onclick="copyText(document.getElementById('webhook-url').textContent,'URL copied!')"
            title="Copy URL"
            class="shrink-0 text-slate-600 hover:text-slate-400 transition-colors p-1">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3"/>
      </svg>
    </button>

    <div class="flex-1"></div>

    <!-- Search -->
    <input id="search" type="search" autocomplete="off" spellcheck="false"
           placeholder="Filter… Ctrl K"
           class="hidden sm:block w-40 bg-slate-900 border border-slate-800 rounded-lg px-3 py-1.5
                  text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-sky-600
                  focus:w-52 transition-all"/>

    <!-- SSE dot -->
    <div class="flex items-center gap-1.5 shrink-0">
      <span id="sse-dot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
      <span id="sse-label" class="hidden sm:inline text-xs text-slate-500">connecting…</span>
    </div>

    <!-- Count -->
    <span id="count-badge"
          class="shrink-0 bg-slate-900 border border-slate-800 text-slate-500 px-2 py-1 rounded-md text-xs tabular-nums">
      —
    </span>

    <!-- Configure Response -->
    <button onclick="openRespModal()" title="Configure response"
            class="shrink-0 flex items-center gap-1.5 border border-slate-700 bg-slate-900 hover:bg-slate-800
                   text-slate-400 hover:text-amber-400 px-3 py-1.5 rounded-lg text-xs transition-colors">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span class="hidden md:inline">Response</span>
    </button>

    <!-- Clear -->
    <button onclick="clearHistory()"
            class="shrink-0 border border-red-900 bg-red-950/40 hover:bg-red-900/50
                   text-red-500 hover:text-red-400 px-3 py-1.5 rounded-lg text-xs transition-colors">
      Clear
    </button>

  </div>
</header>

<!-- ── Split pane ─────────────────────────────────────────────────────────── -->
<div class="flex-1 flex overflow-hidden">

  <!-- Left: request list -->
  <div id="list-pane"
       class="w-full md:w-72 md:shrink-0 border-r border-slate-800 flex flex-col overflow-hidden">
    <!-- Mobile search -->
    <div class="sm:hidden px-2 pt-2 pb-1 border-b border-slate-800/50">
      <input id="search-mobile" type="search" autocomplete="off" spellcheck="false"
             placeholder="Filter…"
             class="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-1.5 text-xs
                    text-slate-200 placeholder-slate-600 focus:outline-none focus:border-sky-600"/>
    </div>
    <div id="requests-list" class="flex-1 overflow-y-auto p-1.5 space-y-px">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Right: detail panel -->
  <div id="detail-pane" class="flex-1 overflow-y-auto">
    <!-- populated by JS -->
  </div>

</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const epId = window.location.pathname.split('/').filter(Boolean)[0] || '';

// ── Utilities ────────────────────────────────────────────────────────────────

function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function syntaxHighlight(raw) {
  if (!raw) return '';
  const t = raw.trimStart();
  if (t[0] !== '{' && t[0] !== '[') return escHtml(raw);
  let out = '', i = 0;
  function nextNonWs(pos) {
    while (pos < raw.length && /\s/.test(raw[pos])) pos++;
    return raw[pos];
  }
  while (i < raw.length) {
    const ch = raw[i];
    if (ch === '"') {
      let j = i + 1;
      while (j < raw.length) {
        if (raw[j] === '\\') { j += 2; continue; }
        if (raw[j] === '"')  { j++;    break;    }
        j++;
      }
      const str = raw.slice(i, j);
      const cls = nextNonWs(j) === ':' ? 'tk-key' : 'tk-str';
      out += `<span class="${cls}">${escHtml(str)}</span>`;
      i = j;
    } else if (ch==='t' && raw.slice(i,i+4)==='true')  { out+='<span class="tk-kw">true</span>';  i+=4; }
    else if   (ch==='f' && raw.slice(i,i+5)==='false') { out+='<span class="tk-kw">false</span>'; i+=5; }
    else if   (ch==='n' && raw.slice(i,i+4)==='null')  { out+='<span class="tk-kw">null</span>';  i+=4; }
    else if (ch==='-' || (ch>='0' && ch<='9')) {
      let j = i;
      while (j < raw.length && /[\d.eE+\-]/.test(raw[j])) j++;
      out += `<span class="tk-num">${escHtml(raw.slice(i,j))}</span>`;
      i = j;
    } else { out += escHtml(ch); i++; }
  }
  return out;
}

let toastTimer;
function toast(msg) {
  const inner = document.getElementById('toast-inner');
  document.getElementById('toast-msg').textContent = msg;
  inner.classList.remove('opacity-0','translate-y-1');
  inner.classList.add('opacity-100','translate-y-0');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    inner.classList.add('opacity-0','translate-y-1');
    inner.classList.remove('opacity-100','translate-y-0');
  }, 2200);
}

function copyText(text, label) {
  if (!text || text === '(empty body)') return;
  navigator.clipboard.writeText(text)
    .then(()  => toast(label || 'Copied!'))
    .catch(() => {
      const el = Object.assign(document.createElement('textarea'),{value:text});
      document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
      toast(label || 'Copied!');
    });
}

function methodStyle(method) {
  switch ((method||'').toUpperCase()) {
    case 'GET':    return 'bg-sky-500/15 border-sky-500/25 text-sky-400';
    case 'POST':   return 'bg-emerald-500/15 border-emerald-500/25 text-emerald-400';
    case 'DELETE': return 'bg-red-500/15 border-red-500/25 text-red-400';
    case 'PUT':    return 'bg-amber-500/15 border-amber-500/25 text-amber-400';
    case 'PATCH':  return 'bg-violet-500/15 border-violet-500/25 text-violet-400';
    case 'HEAD':   return 'bg-pink-500/15 border-pink-500/25 text-pink-400';
    default:       return 'bg-slate-500/15 border-slate-500/25 text-slate-400';
  }
}

function relTime(nanoId) {
  const diff = Date.now() - parseInt(nanoId, 10) / 1e6;
  const s = Math.floor(diff / 1000);
  if (s < 60)  return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60)  return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24)  return h + 'h ago';
  return Math.floor(h/24) + 'd ago';
}

function bodySize(body) {
  if (!body || body === '(empty body)') return null;
  const b = new TextEncoder().encode(body).length;
  return b < 1024 ? b + ' B' : (b/1024).toFixed(1) + ' KB';
}

function buildCurl(req) {
  const webhookUrl = window.location.origin + '/hook/' + epId;
  const skip = new Set(['User-Agent','Accept-Encoding','Content-Length']);
  const flags = Object.entries(req.headers||{})
    .filter(([k]) => !skip.has(k))
    .map(([k,vs]) => `  -H '${k}: ${vs[0].replace(/'/g,"'\\''")}'`)
    .join(' \\\n');
  const body = req.body && req.body !== '(empty body)'
    ? ` \\\n  -d '${req.body.replace(/'/g,"'\\''")}'` : '';
  return `curl -s -X ${req.method} '${webhookUrl}' \\\n${flags}${body}`;
}

// ── State ────────────────────────────────────────────────────────────────────
let allRequests = [];
let filterText  = '';
let selectedId  = null;
let activeTab   = 'body';
let newIds      = new Set();

function visible() {
  if (!filterText) return allRequests;
  const q = filterText.toLowerCase();
  return allRequests.filter(r =>
    r.body.toLowerCase().includes(q) ||
    Object.entries(r.headers||{}).some(([k,vs]) =>
      k.toLowerCase().includes(q) || vs.some(v => v.toLowerCase().includes(q)))
  );
}

// ── List rendering ────────────────────────────────────────────────────────────
const listEl     = document.getElementById('requests-list');
const countBadge = document.getElementById('count-badge');

function renderList() {
  const reqs  = visible();
  const total = allRequests.length;
  countBadge.textContent = filterText ? `${reqs.length}/${total}` : String(total);

  if (!reqs.length) { listEl.innerHTML = renderListEmpty(); return; }

  listEl.innerHTML = reqs.map(r => {
    const sel    = r.id === selectedId;
    const isNew  = newIds.has(r.id);
    const size   = bodySize(r.body);
    return `
      <button onclick="selectRequest('${r.id}')" data-id="${r.id}"
              class="w-full text-left px-2.5 py-2 rounded-lg transition-colors cursor-pointer
                     ${sel  ? 'bg-slate-800 ring-1 ring-slate-700' : 'hover:bg-slate-900/80'}
                     ${isNew ? 'flash-new' : ''}">
        <div class="flex items-center gap-2">
          <span class="shrink-0 border px-1.5 py-0.5 rounded text-[10px] font-bold tracking-wide uppercase ${methodStyle(r.method)}">
            ${escHtml(r.method)}
          </span>
          <span class="text-[11px] text-slate-500 tabular-nums ml-auto shrink-0">${relTime(r.id)}</span>
        </div>
        <div class="flex items-center gap-2 mt-1 pl-0.5">
          <span class="text-[10px] text-slate-700 truncate flex-1">/hook/${escHtml(epId)}</span>
          ${size ? `<span class="text-[10px] text-slate-700 shrink-0 tabular-nums">${size}</span>` : ''}
        </div>
      </button>`;
  }).join('');
}

function renderListEmpty() {
  if (filterText && allRequests.length > 0) {
    return `
      <div class="flex flex-col items-center justify-center py-16 px-4 text-center">
        <p class="text-xs text-slate-500">No match for</p>
        <p class="text-xs text-sky-400 mt-1 truncate max-w-full">"${escHtml(filterText)}"</p>
        <button onclick="clearFilter()"
                class="mt-3 text-xs text-slate-600 hover:text-slate-400 underline underline-offset-2 transition-colors">
          Clear filter
        </button>
      </div>`;
  }
  return `
    <div class="flex flex-col items-center justify-center py-16 px-4 text-center select-none">
      <div class="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center mb-3">
        <svg class="w-5 h-5 text-slate-700" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <p class="text-xs text-slate-600">Waiting for webhooks…</p>
    </div>`;
}

// ── Detail rendering ──────────────────────────────────────────────────────────
const detailEl = document.getElementById('detail-pane');

function renderDetail() {
  if (!selectedId) { detailEl.innerHTML = renderDetailEmpty(); return; }

  const req = allRequests.find(r => r.id === selectedId);
  if (!req)         { detailEl.innerHTML = renderDetailEmpty(); return; }

  const headerCount = Object.keys(req.headers||{}).length;
  const queryCount  = Object.keys(req.query  ||{}).length;
  const hasQuery    = queryCount > 0;

  function tab(t, label) {
    const active = activeTab === t;
    return `<button onclick="setTab('${t}')"
              class="px-3 py-1.5 text-xs rounded-md transition-colors cursor-pointer
                     ${active ? 'bg-slate-800 text-slate-200' : 'text-slate-500 hover:text-slate-300'}">
              ${label}
            </button>`;
  }

  let tabContent = '';
  if (activeTab === 'body') {
    tabContent = `
      <pre class="rounded-xl bg-slate-900 border border-slate-800 p-4 text-xs overflow-auto
                  max-h-[60vh] leading-relaxed whitespace-pre-wrap break-words">${syntaxHighlight(req.body)}</pre>`;
  } else if (activeTab === 'headers') {
    const entries = Object.entries(req.headers||{});
    tabContent = entries.length === 0
      ? '<p class="text-xs text-slate-600 italic">No headers</p>'
      : `<div class="rounded-xl bg-slate-900 border border-slate-800 overflow-hidden">
          <table class="w-full text-xs border-collapse">
            ${entries.map(([k,vs]) => `
              <tr class="border-t border-slate-800/60 align-top first:border-0">
                <td class="py-2 px-3 text-sky-400 whitespace-nowrap font-medium w-1/3">${escHtml(k)}</td>
                <td class="py-2 px-3 text-slate-300 break-all">${vs.map(escHtml).join(', ')}</td>
              </tr>`).join('')}
          </table>
        </div>`;
  } else {
    const entries = Object.entries(req.query||{});
    tabContent = entries.length === 0
      ? '<p class="text-xs text-slate-600 italic">No query params</p>'
      : `<div class="rounded-xl bg-slate-900 border border-slate-800 overflow-hidden">
          <table class="w-full text-xs border-collapse">
            ${entries.map(([k,vs]) => `
              <tr class="border-t border-slate-800/60 align-top first:border-0">
                <td class="py-2 px-3 text-amber-400 whitespace-nowrap font-medium w-1/3">${escHtml(k)}</td>
                <td class="py-2 px-3 text-slate-300 break-all">${vs.map(escHtml).join(', ')}</td>
              </tr>`).join('')}
          </table>
        </div>`;
  }

  const size = bodySize(req.body);

  detailEl.innerHTML = `
    <div class="p-5 flex flex-col gap-4">

      <!-- Back button (mobile only) -->
      <button onclick="backToList()"
              class="md:hidden flex items-center gap-1.5 text-xs text-slate-500 hover:text-slate-300 transition-colors -mb-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
        </svg>
        Back
      </button>

      <!-- Request headline -->
      <div class="flex items-start gap-3 flex-wrap">
        <span class="border px-2.5 py-1 rounded-lg text-sm font-bold tracking-wider uppercase ${methodStyle(req.method)}">
          ${escHtml(req.method)}
        </span>
        <div class="flex-1 min-w-0">
          <code class="text-sm text-slate-300">/hook/${escHtml(epId)}${hasQuery?'<span class="text-amber-500">?…</span>':''}</code>
          <p class="text-xs text-slate-600 mt-0.5">${escHtml(req.timestamp)}${size?` · <span class="tabular-nums">${size}</span>`:''}</p>
        </div>
        <!-- Actions -->
        <div class="flex items-center gap-1.5 shrink-0 flex-wrap">
          <button onclick="replayRequest('${req.id}')"
                  class="flex items-center gap-1.5 px-3 py-1.5 text-xs border border-slate-700 bg-slate-900
                         hover:bg-slate-800 hover:border-emerald-700 hover:text-emerald-400 text-slate-400 rounded-lg transition-colors cursor-pointer">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/>
            </svg>
            Replay
          </button>
          <button onclick="copyText(allRequests.find(r=>r.id==='${req.id}')?.body,'Body copied!')"
                  class="flex items-center gap-1.5 px-3 py-1.5 text-xs border border-slate-700 bg-slate-900
                         hover:bg-slate-800 text-slate-400 rounded-lg transition-colors cursor-pointer">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3"/>
            </svg>
            Body
          </button>
          <button onclick="copyText(buildCurl(allRequests.find(r=>r.id==='${req.id}')),'curl copied!')"
                  class="flex items-center gap-1.5 px-3 py-1.5 text-xs border border-slate-700 bg-slate-900
                         hover:bg-slate-800 text-slate-400 rounded-lg transition-colors cursor-pointer">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/>
            </svg>
            curl
          </button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex items-center gap-1 border-b border-slate-800 pb-3">
        ${tab('body',    'Body')}
        ${tab('headers', `Headers <span class="text-slate-600 text-[10px]">${headerCount}</span>`)}
        ${hasQuery ? tab('query', `Query <span class="text-slate-600 text-[10px]">${queryCount}</span>`) : ''}
      </div>

      <!-- Content -->
      <div>${tabContent}</div>

    </div>`;
}

function renderDetailEmpty() {
  const hookUrl = window.location.origin + '/hook/' + epId;
  return `
    <div class="flex flex-col items-center justify-center h-full min-h-64 text-slate-600 select-none px-8 text-center py-24">
      <svg class="w-14 h-14 mb-4 opacity-20" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.042 21.672L13.684 16.6m0 0l-2.51 2.225.569-9.47 5.227 7.917-3.286-.672zm-7.518-.267A8.25 8.25 0 1120.25 10.5M8.288 14.212A5.25 5.25 0 1117.25 10.5"/>
      </svg>
      <p class="text-slate-500 font-medium text-sm mb-1">Select a request to inspect</p>
      <p class="text-xs text-slate-700 mt-1">Send a POST to</p>
      <code class="text-emerald-700 text-xs mt-1">${escHtml(hookUrl)}</code>
    </div>`;
}

// ── Interactions ──────────────────────────────────────────────────────────────

function selectRequest(id) {
  selectedId = id;
  activeTab  = 'body';
  newIds.delete(id);
  // Mobile: hide list, show detail
  if (window.innerWidth < 768) {
    document.getElementById('list-pane').style.display   = 'none';
    document.getElementById('detail-pane').style.display = 'block';
  }
  renderList();
  renderDetail();
}

function backToList() {
  document.getElementById('list-pane').style.display   = '';
  document.getElementById('detail-pane').style.display = '';
}

function setTab(t) {
  activeTab = t;
  renderDetail();
}

function clearFilter() {
  filterText = '';
  document.getElementById('search').value = '';
  const ms = document.getElementById('search-mobile');
  if (ms) ms.value = '';
  renderList();
}

async function replayRequest(id) {
  toast('Replaying…');
  try {
    const res  = await fetch(`/api/${epId}/replay/${id}`, {method:'POST'});
    const data = await res.json();
    toast(res.ok ? `Replayed → ${data.code}` : 'Replay failed');
  } catch { toast('Replay failed'); }
}

async function clearHistory() {
  await fetch(`/api/${epId}/clear`, {method:'POST'}).catch(()=>{});
}

// ── Response Config ───────────────────────────────────────────────────────────

async function openRespModal() {
  try {
    const res = await fetch(`/api/${epId}/response-config`);
    const cfg = await res.json();
    document.getElementById('resp-status').value = cfg.status_code  || 200;
    document.getElementById('resp-ctype').value  = cfg.content_type || 'application/json';
    document.getElementById('resp-body').value   = cfg.body         || '{"status":"captured"}';
  } catch {
    document.getElementById('resp-status').value = 200;
    document.getElementById('resp-ctype').value  = 'application/json';
    document.getElementById('resp-body').value   = '{"status":"captured"}';
  }
  document.getElementById('resp-modal').classList.remove('hidden');
}

function closeRespModal() {
  document.getElementById('resp-modal').classList.add('hidden');
}

function resetRespConfig() {
  document.getElementById('resp-status').value = 200;
  document.getElementById('resp-ctype').value  = 'application/json';
  document.getElementById('resp-body').value   = '{"status":"captured"}';
}

async function saveRespConfig() {
  const cfg = {
    status_code:  parseInt(document.getElementById('resp-status').value, 10),
    content_type: document.getElementById('resp-ctype').value.trim(),
    body:         document.getElementById('resp-body').value,
  };
  try {
    await fetch(`/api/${epId}/response-config`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(cfg),
    });
    closeRespModal();
    toast('Response configured!');
  } catch { toast('Failed to save'); }
}

// ── SSE ───────────────────────────────────────────────────────────────────────

const dot = document.getElementById('sse-dot');
const lbl = document.getElementById('sse-label');
const sseStates = {
  connecting: ['bg-yellow-500 animate-pulse', 'connecting…'],
  live:       ['bg-emerald-500 animate-pulse', 'live'],
  error:      ['bg-red-600',                   'reconnecting…'],
};
function setSse(state) {
  dot.className = `w-2 h-2 rounded-full ${sseStates[state][0]}`;
  lbl.textContent = sseStates[state][1];
}

function connect() {
  setSse('connecting');
  const es = new EventSource(`/api/${epId}/events`);

  es.addEventListener('init', e => {
    allRequests = JSON.parse(e.data) || [];
    setSse('live');
    if (allRequests.length > 0 && !selectedId) {
      selectedId = allRequests[0].id;
    }
    renderList();
    renderDetail();
  });

  es.addEventListener('webhook', e => {
    const req = JSON.parse(e.data);
    allRequests.unshift(req);
    if (allRequests.length > 50) allRequests.pop();
    newIds.add(req.id);
    const autoSelect = !selectedId;
    if (autoSelect) { selectedId = req.id; activeTab = 'body'; }
    renderList();
    if (autoSelect || selectedId === req.id) renderDetail();
    setTimeout(() => { newIds.delete(req.id); }, 1500);
  });

  es.addEventListener('cleared', () => {
    allRequests = []; selectedId = null; newIds.clear();
    renderList(); renderDetail();
  });

  es.onerror = () => { setSse('error'); es.close(); setTimeout(connect, 3000); };
}

// ── Controls ──────────────────────────────────────────────────────────────────

function onSearch(val) { filterText = val; renderList(); }
document.getElementById('search').addEventListener('input', e => onSearch(e.target.value));
const mobileSearch = document.getElementById('search-mobile');
if (mobileSearch) mobileSearch.addEventListener('input', e => onSearch(e.target.value));

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault(); document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    closeRespModal();
    document.getElementById('search').blur();
  }
});

// Refresh relative timestamps every 30s
setInterval(() => { if (allRequests.length) renderList(); }, 30000);

// ── Boot ──────────────────────────────────────────────────────────────────────

document.getElementById('webhook-url').textContent = window.location.origin + '/hook/' + epId;

try {
  const recent   = JSON.parse(localStorage.getItem('wt_recent') || '[]');
  const filtered = recent.filter(e => e.id !== epId);
  filtered.unshift({id: epId, visitedAt: new Date().toISOString()});
  localStorage.setItem('wt_recent', JSON.stringify(filtered.slice(0, 10)));
} catch(_) {}

connect();
</script>
