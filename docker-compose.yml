services:
  webhook-tester:
    # Build the image locally.
    # To use a pre-built image instead, replace `build` with:
    #   image: ghcr.io/<your-org>/webhook-tester:latest
    build:
      context: .
      dockerfile: Dockerfile
    image: webhook-tester:latest
    container_name: webhook-tester
    ports:
      # HOST:CONTAINER — change the left side to expose on a different host port.
      - "8111:8080"
    environment:
      PORT: "8080"
      # Uncomment to enable Basic Auth on the UI (username = anything, password = token)
      # WEBHOOK_TOKEN: "changeme"
    restart: unless-stopped
    # Resource limits — sensible defaults for a lightweight tool.
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
