services:
  webhook-tester:
    # Use the pre-built image from GitHub Container Registry.
    # To build locally instead, replace `image` with:
    #   build:
    #     context: .
    #     dockerfile: Dockerfile
    image: ghcr.io/kgma74/webhook-tester:latest
    container_name: webhook-tester
    ports:
      # HOST:CONTAINER — change the left side to expose on a different host port.
      - "8080:8080"
    environment:
      PORT: "8080"
      # Uncomment to enable Basic Auth on the UI (username = anything, password = token)
      # WEBHOOK_TOKEN: "changeme"
    restart: unless-stopped
    # Resource limits — sensible defaults for a lightweight tool.
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
